name: Stress Test ARC
on: workflow_dispatch # Para darle al botón manual

jobs:
  test-scaling:
    runs-on: arc-runner-set
    strategy:
      # Esto lanzará 8 trabajos a la vez
      matrix:
        id: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - name: Simulando trabajo
        run: |
          echo "Soy el runner numero ${{ matrix.id }}"
          sleep 20
